apiVersion: apps/v1
kind: Deployment
metadata:
  name: jarvis-console
  namespace: jarvis
  labels:
    app: jarvis-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jarvis-console
  template:
    metadata:
      labels:
        app: jarvis-console
    spec:
      containers:
      - name: console
        image: ghcr.io/lordmuffin/jarvis-console:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_ROUTER_URL
          value: "http://jarvis-router.jarvis.svc.cluster.local:8000"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
