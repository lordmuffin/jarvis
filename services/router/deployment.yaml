apiVersion: apps/v1
kind: Deployment
metadata:
  name: jarvis-router
  namespace: jarvis
  labels:
    app: jarvis-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jarvis-router
  template:
    metadata:
      labels:
        app: jarvis-router
    spec:
      containers:
      - name: router
        image: ghcr.io/lordmuffin/jarvis-router:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: jarvis-router-db-app
              key: uri
        - name: LEMONADE_SERVER_URL
          value: "http://lemonade.ai.svc.cluster.local:8000"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
