name: ci-termux

on:
  push:
    paths:
      - "termux/**"
      - "scripts/**"
      - ".github/workflows/ci-termux.yml"
  pull_request:
    paths:
      - "termux/**"
      - "scripts/**"
      - ".github/workflows/ci-termux.yml"

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck termux/*.sh
        run: shellcheck termux/*.sh
      - name: shellcheck scripts/*.sh
        run: shellcheck scripts/*.sh

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n
        run: |
          set -e
          for f in termux/*.sh scripts/*.sh; do
            bash -n "$f" && echo "syntax OK: $f"
          done
