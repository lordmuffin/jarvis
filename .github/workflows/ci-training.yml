name: ci-training

on:
  push:
    paths:
      - "training/**"
      - ".github/workflows/ci-training.yml"
  pull_request:
    paths:
      - "training/**"
      - ".github/workflows/ci-training.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: training
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check jarvis_training tests
      - name: Pytest
        run: python -m pytest -q

  tokenizer-hash-drift:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: training
    steps:
      - uses: actions/checkout@v4
      - name: Verify committed tokenizer hash matches tokenizer.json (when both exist)
        run: |
          if [ ! -f artifacts/tokenizer.json ]; then
            echo "tokenizer.json not yet produced (pre-1.3) — skip"
            exit 0
          fi
          if [ ! -f artifacts/.tokenizer.sha256 ]; then
            echo "MISSING artifacts/.tokenizer.sha256 — commit it alongside tokenizer.json"
            exit 1
          fi
          actual=$(sha256sum artifacts/tokenizer.json | awk '{print $1}')
          expected=$(cat artifacts/.tokenizer.sha256 | awk '{print $1}')
          if [ "$actual" != "$expected" ]; then
            echo "tokenizer.json hash drift!"
            echo "expected: $expected"
            echo "actual:   $actual"
            echo "Re-run 1.3 training to regenerate tokenizer.json + .tokenizer.sha256"
            exit 1
          fi
          echo "tokenizer hash OK ($actual)"
